name: 🐛 Bug Report
description: Report a problem or unexpected behavior in the plugin
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## 🧩 Bug Report — RegenSystem v2.0.1  
        Thanks for taking the time to report a bug!  
        Please fill out all required fields (**marked with `*`**) so I can reproduce and fix the issue as quickly as possible.

  - type: input
    id: title
    attributes:
      label: Bug title *
      description: A short and clear title describing the issue.
      placeholder: Example — Zone not restoring after regen
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version *
      placeholder: ex. 2.0.1
      value: 2.0.1
    validations:
      required: true

  - type: input
    id: server
    attributes:
      label: Server type and version *
      description: Specify your server implementation and version.
      placeholder: ex. Paper 1.21.1 or Spigot 1.20.6
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Detailed bug description *
      description: Explain what happened, what you expected to happen, and what actually occurred.
      placeholder: |
        When I regenerate an area, some blocks are not restored.
        Expected: all blocks to reappear as before.
        Actual: chests and signs disappear.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce (if known)
      description: If you know how to reproduce the issue, describe it step by step.
      placeholder: |
        1. Use /regen create test
        2. Break a block inside the region
        3. Run /regen start test
        4. Observe the missing block
    validations:
      required: false

  - type: textarea
    id: pluginFiles
    attributes:
      label: Plugin files on your server *
      description: List or upload the RegenSystem plugin files present on your server (e.g., `zones.db`, `zones.yml`, etc.).
      placeholder: |
        zones.db
        zones.yml
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console errors or logs
      description: Paste any relevant errors or warnings from your server console.
      render: shell
      placeholder: |
        [ERROR] Could not restore block state for STONE at (123, 64, -45)
    validations:
      required: false
